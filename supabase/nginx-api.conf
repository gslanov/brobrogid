# BROBROGID API — nginx reverse proxy
# Place at /etc/nginx/sites-available/api-brobrogid
# Symlink:    /etc/nginx/sites-enabled/api-brobrogid
# SSL cert:   certbot --nginx -d api.brobrogid.ru

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name api.brobrogid.ru;
    return 301 https://$host$request_uri;
}

# HTTPS
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.brobrogid.ru;

    # SSL — managed by certbot
    ssl_certificate /etc/letsencrypt/live/api.brobrogid.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.brobrogid.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    server_tokens off;

    # CORS — allow brobrogid.ru to call API from browser
    set $cors_origin "";
    if ($http_origin ~ "^https://(brobrogid\.ru|localhost:\d+)$") {
        set $cors_origin $http_origin;
    }
    add_header Access-Control-Allow-Origin $cors_origin always;
    add_header Access-Control-Allow-Credentials "true" always;
    add_header Access-Control-Allow-Methods "GET, POST, PATCH, PUT, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type, Prefer, Range, apikey, x-client-info" always;
    add_header Access-Control-Expose-Headers "Content-Range" always;

    # OPTIONS preflight
    if ($request_method = OPTIONS) {
        return 204;
    }

    # Rate limiting (basic)
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

    # Compression
    gzip on;
    gzip_types application/json text/plain;
    gzip_min_length 256;

    # REST API — PostgREST
    location /rest/v1/ {
        limit_req zone=api_limit burst=60 nodelay;
        rewrite ^/rest/v1/(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Auth API — GoTrue
    location /auth/v1/ {
        limit_req zone=api_limit burst=20 nodelay;
        rewrite ^/auth/v1/(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:9999;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Health
    location = /health {
        access_log off;
        return 200 '{"status":"ok"}';
        add_header Content-Type application/json;
    }

    # Root — info
    location = / {
        return 200 '{"service":"brobrogid-api","endpoints":["/rest/v1/*","/auth/v1/*","/health"]}';
        add_header Content-Type application/json;
    }

    # Block everything else
    location / {
        return 404;
    }

    # Logs
    access_log /var/log/nginx/api-brobrogid-access.log;
    error_log /var/log/nginx/api-brobrogid-error.log;
}
