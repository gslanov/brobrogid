services:
  postgres:
    image: postgres:16-alpine
    container_name: brobrogid-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: brobrogid
    volumes:
      - /opt/supabase/postgres-data:/var/lib/postgresql/data
      - ./migrations:/migrations:ro
      - ./seed:/seed:ro
      - /opt/supabase/backups:/backups
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10
    command:
      - "postgres"
      - "-c"
      - "max_connections=100"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "effective_cache_size=1GB"
      - "-c"
      - "work_mem=4MB"
    mem_limit: 1g
    mem_reservation: 256m

  postgrest:
    image: postgrest/postgrest:v12.2.0
    container_name: brobrogid-postgrest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGRST_DB_URI: postgres://authenticator:${AUTHENTICATOR_PASSWORD}@postgres:5432/brobrogid
      PGRST_DB_SCHEMAS: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET}
      PGRST_JWT_SECRET_IS_BASE64: "false"
      PGRST_SERVER_PORT: 3000
      PGRST_DB_MAX_ROWS: 1000
      PGRST_DB_POOL: 10
      PGRST_OPENAPI_MODE: "disabled"
      PGRST_LOG_LEVEL: info
    ports:
      - "127.0.0.1:3000:3000"
    mem_limit: 256m
    mem_reservation: 64m

  gotrue:
    image: supabase/gotrue:v2.162.0
    container_name: brobrogid-gotrue
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      API_EXTERNAL_URL: https://api.brobrogid.ru
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://supabase_auth_admin:${AUTH_ADMIN_PASSWORD}@postgres:5432/brobrogid?search_path=auth
      GOTRUE_SITE_URL: https://brobrogid.ru
      GOTRUE_URI_ALLOW_LIST: https://brobrogid.ru,https://api.brobrogid.ru,http://localhost:8150
      GOTRUE_DISABLE_SIGNUP: "true"
      GOTRUE_JWT_ADMIN_ROLES: admin
      GOTRUE_JWT_AUD: authenticated
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_JWT_SECRET: ${JWT_SECRET}
      GOTRUE_JWT_EXP: 3600
      GOTRUE_MAILER_AUTOCONFIRM: "true"
      GOTRUE_EXTERNAL_EMAIL_ENABLED: "false"
      GOTRUE_EXTERNAL_PHONE_ENABLED: "false"
      GOTRUE_SMS_AUTOCONFIRM: "true"
      GOTRUE_LOG_LEVEL: info
    ports:
      - "127.0.0.1:9999:9999"
    mem_limit: 256m
    mem_reservation: 64m
