<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>BROBROGID — Phone Preview</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  .phone {
    position: relative;
    width: 390px;
    height: 844px;
    background: #000;
    border-radius: 50px;
    padding: 12px;
    box-shadow:
      0 0 0 3px #333,
      0 0 0 6px #1a1a1a,
      0 30px 80px rgba(0,0,0,0.6),
      inset 0 0 8px rgba(255,255,255,0.05);
  }
  /* Notch */
  .phone::before {
    content: '';
    position: absolute;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    width: 126px;
    height: 32px;
    background: #000;
    border-radius: 0 0 20px 20px;
    z-index: 10;
  }
  /* Dynamic Island pill */
  .phone::after {
    content: '';
    position: absolute;
    top: 18px;
    left: 50%;
    transform: translateX(-50%);
    width: 120px;
    height: 24px;
    background: #111;
    border-radius: 20px;
    z-index: 11;
  }
  .screen {
    width: 100%;
    height: 100%;
    border-radius: 40px;
    overflow: hidden;
    background: #fff;
  }
  .screen iframe {
    width: 100%;
    height: 100%;
    border: none;
  }
  /* Side buttons */
  .btn-power {
    position: absolute;
    right: -3px;
    top: 180px;
    width: 3px;
    height: 80px;
    background: #333;
    border-radius: 0 3px 3px 0;
  }
  .btn-vol-up {
    position: absolute;
    left: -3px;
    top: 160px;
    width: 3px;
    height: 50px;
    background: #333;
    border-radius: 3px 0 0 3px;
  }
  .btn-vol-down {
    position: absolute;
    left: -3px;
    top: 220px;
    width: 3px;
    height: 50px;
    background: #333;
    border-radius: 3px 0 0 3px;
  }
  .label {
    color: #666;
    text-align: center;
    margin-top: 24px;
    font-size: 13px;
    letter-spacing: 0.5px;
  }
  .wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .controls {
    display: flex;
    gap: 12px;
    margin-top: 16px;
  }
  .controls button {
    padding: 8px 16px;
    border: 1px solid #444;
    background: #2a2a3e;
    color: #ccc;
    border-radius: 8px;
    cursor: pointer;
    font-size: 12px;
    transition: all 0.2s;
  }
  .controls button:hover { background: #3a3a5e; color: #fff; }
  .controls button.active { background: #1A73E8; border-color: #1A73E8; color: #fff; }
</style>
</head>
<body>
  <div class="wrapper">
    <div class="phone" id="phone">
      <div class="btn-power"></div>
      <div class="btn-vol-up"></div>
      <div class="btn-vol-down"></div>
      <div class="screen">
        <iframe src="http://localhost:8153" id="app"></iframe>
      </div>
    </div>
    <p class="label">BROBROGID — iPhone 15 Pro (390×844)</p>
    <div class="controls">
      <button onclick="setDevice(390, 844, 'iPhone 15 Pro')" class="active">iPhone 15 Pro</button>
      <button onclick="setDevice(412, 915, 'Pixel 8')">Pixel 8</button>
      <button onclick="setDevice(375, 667, 'iPhone SE')">iPhone SE</button>
      <button onclick="setDevice(428, 926, 'iPhone 15 Plus')">iPhone 15 Plus</button>
      <button onclick="resetDB()" style="background:#dc2626;border-color:#dc2626;color:#fff">Reset DB & Reload</button>
    </div>
  </div>
  <script>
    function resetDB() {
      const iframe = document.getElementById('app');
      iframe.contentWindow.indexedDB.deleteDatabase('brobrogid');
      localStorage.removeItem('brobrogid_onboarding');
      iframe.src = 'http://localhost:8153/?t=' + Date.now();
    }
    function setDevice(w, h, name) {
      const phone = document.getElementById('phone');
      phone.style.width = w + 'px';
      phone.style.height = h + 'px';
      document.querySelector('.label').textContent = `BROBROGID — ${name} (${w}×${h})`;
      document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
      event.target.classList.add('active');
    }
  </script>
</body>
</html>
