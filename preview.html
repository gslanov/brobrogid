<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>BROBROGID — iPhone Preview</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #334155 100%);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    overflow: hidden;
  }

  .phone {
    width: 390px;
    height: 844px;
    background: #000;
    border-radius: 55px;
    padding: 12px;
    position: relative;
    box-shadow:
      0 0 0 2px #1a1a1a,
      0 0 0 4px #333,
      0 0 0 5px #1a1a1a,
      0 40px 80px rgba(0,0,0,0.5),
      0 0 120px rgba(30, 64, 175, 0.15);
  }

  /* Side buttons */
  .phone::before {
    content: '';
    position: absolute;
    right: -3px;
    top: 180px;
    width: 4px;
    height: 80px;
    background: #333;
    border-radius: 0 4px 4px 0;
  }
  .phone::after {
    content: '';
    position: absolute;
    left: -3px;
    top: 150px;
    width: 4px;
    height: 40px;
    background: #333;
    border-radius: 4px 0 0 4px;
    box-shadow: 0 55px 0 #333, 0 95px 0 #333;
  }

  .screen {
    width: 100%;
    height: 100%;
    border-radius: 44px;
    overflow: hidden;
    position: relative;
    background: #fff;
  }

  /* Dynamic Island */
  .notch {
    position: absolute;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    width: 126px;
    height: 36px;
    background: #000;
    border-radius: 20px;
    z-index: 100;
  }

  .screen iframe {
    width: 100%;
    height: 100%;
    border: none;
    border-radius: 44px;
  }

  /* Home indicator */
  .home-indicator {
    position: absolute;
    bottom: 8px;
    left: 50%;
    transform: translateX(-50%);
    width: 134px;
    height: 5px;
    background: rgba(0,0,0,0.3);
    border-radius: 3px;
    z-index: 100;
  }

  /* Reflection */
  .phone-reflection {
    position: absolute;
    top: 12px;
    left: 12px;
    right: 12px;
    height: 200px;
    background: linear-gradient(180deg, rgba(255,255,255,0.08) 0%, transparent 100%);
    border-radius: 44px 44px 0 0;
    pointer-events: none;
    z-index: 50;
  }

  /* Label */
  .label {
    position: fixed;
    bottom: 30px;
    text-align: center;
    color: rgba(255,255,255,0.4);
    font-size: 13px;
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  @media (max-height: 900px) {
    .phone {
      transform: scale(0.85);
    }
  }
  @media (max-height: 750px) {
    .phone {
      transform: scale(0.7);
    }
  }
</style>
</head>
<body>
  <div class="phone">
    <div class="screen">
      <div class="notch"></div>
      <iframe src="http://localhost:8150/" allow="geolocation"></iframe>
      <div class="home-indicator"></div>
    </div>
    <div class="phone-reflection"></div>
  </div>
  <div class="label">BROBROGID</div>
</body>
</html>
